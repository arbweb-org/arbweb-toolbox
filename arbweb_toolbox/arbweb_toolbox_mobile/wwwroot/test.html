<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>arbweb_toolbox_mobile</title>
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="arbweb_toolbox_mobile.styles.css" rel="stylesheet" />

    <!-- interact.js -->
    <script src="js/interact.min.js"></script>
    <script src="js/Resizable.js"></script>

    <style>
        @font-face {
            font-family: 'CascadiaMono';
            src: url(fonts/CascadiaMono.woff2) format('woff2');
        }

        @font-face {
            font-family: 'DroidNaskh';
            src: url(fonts/DroidNaskh-Regular.woff2) format('woff2');
        }
    </style>
</head>

<body style="font-family:DroidNaskh">
    <div style="height:100vh; max-height:100vh; overflow:hidden; text-align:right">
        <!-- زر القائمة والعنوان -->
        <div style="margin:15px"
             class="d-flex justify-content-between">
            <div style="width:100px">&nbsp;</div>
            <div style="text-align:center; font-weight:bold">صندوق الأدوات</div>
            <div style="width:100px"><span class="oi oi-menu"></span></div>
        </div>

        <!-- رسالة الترحيب وصورة الملف الشخصي -->
        <div style="margin:30px 15px 25px 15px; height:32px; line-height:32px"
             class="d-flex justify-content-between">
            <img src="img/profile.svg" style="border-radius:16px" />
            <div style="font-size:32px" dir="rtl">مرحبا!</div>
        </div>

        <!-- صندوق البحث -->
        <div style="margin: 15px;height: 50px;line-height: 50px;background-color: aliceblue;border-radius: 25px;border-style: solid;border-width: 2px;" class="d-flex justify-content-between">
            <div style="padding: 0px 0px 0px 15px;">
                <span class="oi oi-magnifying-glass"></span>
            </div>
            <input type="text" class="_c_borderlessinp" style="width: 100%; height: 30px; margin: 8px 15px 0px 0px; font-size: 20px; text-align: right; direction: rtl">
        </div>

        <!-- اقتراحات البحث -->
        <div style="overflow-x:scroll; direction: rtl"
             class="_c_invisible_scroll">
            <div style="margin: 15px; height: 36px; line-height: 36px; width: max-content; font-size:0px">
                <div class="_c_search_item" style="background-color:gold">زين</div>
                <div class="_c_search_item">تحويل رصيد</div>
                <div class="_c_search_item">تعبئة رصيد</div>
                <div class="_c_search_item">واتساب</div>
            </div>
        </div>
    </div>
</body>
</html>
